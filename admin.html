<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FuelFinder PH | Admin Approvals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="./config.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-2xl mx-auto mt-10 bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-2xl font-black text-blue-600 mb-6">Admin Price Approvals</h1>
        <div id="pending-list"></div>
        <button onclick="window.location.href='index.html'" class="mt-6 bg-gray-200 text-gray-700 px-4 py-2 rounded font-bold">Back to Main Page</button>
    </div>

    <!-- Modal for feedback -->
    <div id="action-modal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-xl shadow-xl p-6 max-w-xs w-full text-center">
            <div id="action-modal-message" class="text-lg font-bold mb-4"></div>
            <button onclick="closeActionModal()" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded font-bold">Close</button>
        </div>
    </div>

    <script>
        let username = localStorage.getItem('username');
        // You may want to check admin status here as well

        // Ensure config is available
        async function showPendingApprovals() {
            // Wait for config to be loaded
            if (typeof config === 'undefined' || !config.API_BASE_URL) {
                // Fallback to hardcoded URL if config is not available
                const fallbackUrl = 'https://gasprice-map-butuan.onrender.com';
                const res = await fetch(`${fallbackUrl}/api/prices?approved=false`);
                const pending = await res.json();
                const list = document.getElementById('pending-list');
                if (pending.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">No pending submissions.</p>';
                    return;
                }
                list.innerHTML = pending.map(sub => {
                    const safeName = sub.stationName.replace(/'/g, "\\'");
                    return `
                        <div class="p-4 border rounded mb-4 bg-gray-50">
                            <div><b>${sub.stationName}</b> (${sub.lat !== undefined ? sub.lat.toFixed(4) : 'N/A'}, ${sub.lng !== undefined ? sub.lng.toFixed(4) : 'N/A'})</div>
                            <div>
                                Diesel: ₱${sub.prices && typeof sub.prices.diesel === 'number' ? sub.prices.diesel.toFixed(2) : 'N/A'} |
                                91: ₱${sub.prices && typeof sub.prices.u91 === 'number' ? sub.prices.u91.toFixed(2) : 'N/A'} |
                                95: ₱${sub.prices && typeof sub.prices.u95 === 'number' ? sub.prices.u95.toFixed(2) : 'N/A'}
                            </div>
                            ${sub.photoUrl ? `<div class="mt-2"><img src="${sub.photoUrl}" alt="Price Photo" style="max-width:200px; border-radius:12px;"></div>` : ''}
                            <div class="mt-2">
                                <button onclick="approveSubmission('${safeName}', ${sub.lat}, ${sub.lng})" class="bg-green-500 text-white px-3 py-1 rounded mr-2">Approve</button>
                                <button onclick="rejectSubmission('${safeName}', ${sub.lat}, ${sub.lng})" class="bg-red-500 text-white px-3 py-1 rounded">Reject</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                // Use config URL
                const res = await fetch(`${config.API_BASE_URL}/api/prices?approved=false`);
                const pending = await res.json();
                const list = document.getElementById('pending-list');
                if (pending.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">No pending submissions.</p>';
                    return;
                }
                list.innerHTML = pending.map(sub => {
                    const safeName = sub.stationName.replace(/'/g, "\\'");
                    return `
                        <div class="p-4 border rounded mb-4 bg-gray-50">
                            <div><b>${sub.stationName}</b> (${sub.lat !== undefined ? sub.lat.toFixed(4) : 'N/A'}, ${sub.lng !== undefined ? sub.lng.toFixed(4) : 'N/A'})</div>
                            <div>
                                Diesel: ₱${sub.prices && typeof sub.prices.diesel === 'number' ? sub.prices.diesel.toFixed(2) : 'N/A'} |
                                91: ₱${sub.prices && typeof sub.prices.u91 === 'number' ? sub.prices.u91.toFixed(2) : 'N/A'} |
                                95: ₱${sub.prices && typeof sub.prices.u95 === 'number' ? sub.prices.u95.toFixed(2) : 'N/A'}
                            </div>
                            ${sub.photoUrl ? `<div class="mt-2"><img src="${sub.photoUrl}" alt="Price Photo" style="max-width:200px; border-radius:12px;"></div>` : ''}
                            <div class="mt-2">
                                <button onclick="approveSubmission('${safeName}', ${sub.lat}, ${sub.lng})" class="bg-green-500 text-white px-3 py-1 rounded mr-2">Approve</button>
                                <button onclick="rejectSubmission('${safeName}', ${sub.lat}, ${sub.lng})" class="bg-red-500 text-white px-3 py-1 rounded">Reject</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        function approveSubmission(stationName, lat, lng) {
            const apiUrl = (typeof config !== 'undefined' && config.API_BASE_URL) 
                ? config.API_BASE_URL 
                : 'https://gasprice-map-butuan.onrender.com';
            
            // Get username from localStorage since it's not available in admin context
            const adminUsername = localStorage.getItem('username');
            
            if (!adminUsername) {
                alert('Please log in first');
                window.location.href = 'index.html';
                return;
            }
            
            fetch(`${apiUrl}/api/approve-price`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    stationName: stationName.trim(),
                    lat: Number(lat),
                    lng: Number(lng),
                    adminUsername: adminUsername
                })
            }).then(res => res.json()).then(result => {
                showActionModal(result.message || result.error);
                showPendingApprovals();
            }).catch(err => {
                console.error('Approve error:', err);
                showActionModal('Error approving submission');
            });
        }

        function rejectSubmission(stationName, lat, lng) {
            const apiUrl = (typeof config !== 'undefined' && config.API_BASE_URL) 
                ? config.API_BASE_URL 
                : 'https://gasprice-map-butuan.onrender.com';
            
            // Get username from localStorage since it's not available in admin context
            const adminUsername = localStorage.getItem('username');
            
            if (!adminUsername) {
                alert('Please log in first');
                window.location.href = 'index.html';
                return;
            }
            
            fetch(`${apiUrl}/api/reject-price`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    stationName: stationName.trim(),
                    lat: Number(lat),
                    lng: Number(lng),
                    adminUsername: adminUsername
                })
            }).then(res => res.json()).then(result => {
                showActionModal(result.message || result.error);
                showPendingApprovals();
            }).catch(err => {
                console.error('Reject error:', err);
                showActionModal('Error rejecting submission');
            });
        }

        function showActionModal(message) {
            document.getElementById('action-modal-message').innerText = message;
            document.getElementById('action-modal').classList.remove('hidden');
        }

        function closeActionModal() {
            document.getElementById('action-modal').classList.add('hidden');
        }

        const apiUrl = (typeof config !== 'undefined' && config.API_BASE_URL) 
            ? config.API_BASE_URL 
            : 'https://gasprice-map-butuan.onrender.com';
            
        fetch(`${apiUrl}/api/user-score?username=` + encodeURIComponent(username))
            .then(res => res.json())
            .then(data => {
                if (!data.isAdmin) {
                    alert('Admin access required.');
                    window.location.href = 'index.html';
                } else {
                    showPendingApprovals();
                }
            });
    </script>
</body>
</html>
