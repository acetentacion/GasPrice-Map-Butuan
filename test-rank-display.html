<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Rank Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-2xl font-bold mb-4">Test Rank Display</h1>
    
    <div class="grid grid-cols-3 gap-4 mb-4">
        <button onclick="testRankDisplay('diesel')" class="bg-blue-500 text-white p-2 rounded">Test Diesel Rank Display</button>
        <button onclick="testRankDisplay('u91')" class="bg-green-500 text-white p-2 rounded">Test U91 Rank Display</button>
        <button onclick="testRankDisplay('u95')" class="bg-red-500 text-white p-2 rounded">Test U95 Rank Display</button>
    </div>
    
    <div id="test-output" class="bg-white p-4 rounded-lg">
        <h2 class="text-lg font-bold mb-2">Test Output:</h2>
        <div id="output-content"></div>
    </div>

    <script>
        function testRankDisplay(fuelType) {
            const output = document.getElementById('output-content');
            
            // Test the exact HTML structure that should be generated
            const priceColor = getPriceColor(fuelType);
            const brandLogo = '⛽';
            
            let html = `
                <div class="bg-white border border-gray-100 rounded-2xl p-4 hover:shadow-md transition-shadow cursor-pointer station-rank-item">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">
                                ${brandLogo}
                            </div>
                            <div>
                                <h3 class="font-black text-gray-800 text-lg">Test Station</h3>
                                <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">Test Brand</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Rank</div>
                            <div class="w-8 h-8 ${priceColor} text-white rounded-full flex items-center justify-center font-black text-sm">
                                #1
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-4 text-sm">
                            <span class="text-gray-600">📍 8.9475, 125.5406</span>
                            <span class="text-gray-600">👤 testuser</span>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Price</div>
                            <div class="text-2xl font-black ${priceColor}">₱50.00</div>
                        </div>
                    </div>
                    <div class="mt-3 flex items-center justify-between text-xs text-gray-400">
                        <span>Updated Just now</span>
                        <span class="px-2 py-1 bg-gray-100 rounded-full">Total Stations: 5</span>
                    </div>
                </div>
            `;
            
            output.innerHTML = html;
        }
        
        function getPriceColor(fuelType) {
            const colorMap = {
                'diesel': 'text-blue-600',
                'u91': 'text-green-600',
                'u95': 'text-red-600'
            };
            return colorMap[fuelType] || 'text-gray-600';
        }
    </script>
</body>
</html>
