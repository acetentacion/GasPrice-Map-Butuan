<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Marker Functionality</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 400px; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 p-4">
    <h1 class="text-2xl font-bold mb-4">Test Marker Click Functionality</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <h2 class="text-lg font-bold mb-2">Map with Test Markers</h2>
            <div id="map" class="border rounded"></div>
        </div>
        
        <div>
            <h2 class="text-lg font-bold mb-2">Test Results</h2>
            <div id="test-results" class="bg-white p-4 rounded border space-y-2">
                <div class="font-bold">Status: <span id="status" class="text-blue-600">Testing...</span></div>
                <div>showStationDetails function: <span id="function-status" class="text-gray-600">Checking...</span></div>
                <div>currentStation global: <span id="global-status" class="text-gray-600">Checking...</span></div>
                <div>Marker click test: <span id="click-status" class="text-gray-600">Not tested</span></div>
            </div>
            
            <div class="mt-4 space-y-2">
                <button onclick="testFunctionAvailability()" class="bg-blue-500 text-white px-4 py-2 rounded">Test Function Availability</button>
                <button onclick="testGlobalVariables()" class="bg-green-500 text-white px-4 py-2 rounded">Test Global Variables</button>
                <button onclick="testMarkerClick()" class="bg-purple-500 text-white px-4 py-2 rounded">Test Marker Click</button>
                <button onclick="clearResults()" class="bg-gray-500 text-white px-4 py-2 rounded">Clear Results</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { showStationDetails } from './stationDetails.js';
        import config from './config.js';

        // Test data for a mock station
        const testStation = {
            name: "Test Gas Station",
            brand: "Shell",
            lat: 8.9475,
            lng: 125.5406,
            address: "Test Address, Butuan City",
            prices: {
                diesel: 54.50,
                u91: 58.75,
                u95: 61.25
            },
            submitted: {
                confirmScore: 3,
                disputeScore: 1,
                timestamp: new Date().toISOString()
            }
        };

        // Initialize map
        const map = L.map('map').setView([8.9475, 125.5406], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Add test marker
        const marker = L.marker([8.9475, 125.5406]).addTo(map);
        marker.bindPopup("<b>Test Gas Station</b><br>Click to test functionality").openPopup();

        // Test functions
        window.testFunctionAvailability = function() {
            const results = document.getElementById('test-results');
            const functionStatus = document.getElementById('function-status');
            
            if (typeof showStationDetails === 'function') {
                functionStatus.textContent = "Available ✓";
                functionStatus.className = "text-green-600";
            } else {
                functionStatus.textContent = "Not available ✗";
                functionStatus.className = "text-red-600";
            }
        };

        window.testGlobalVariables = function() {
            const globalStatus = document.getElementById('global-status');
            
            if (typeof window.showStationDetails === 'function') {
                globalStatus.textContent = "Available ✓";
                globalStatus.className = "text-green-600";
            } else {
                globalStatus.textContent = "Not available ✗";
                globalStatus.className = "text-red-600";
            }
        };

        window.testMarkerClick = function() {
            const clickStatus = document.getElementById('click-status');
            
            try {
                // Simulate marker click
                marker.fire('click');
                clickStatus.textContent = "Tested - Check console for results";
                clickStatus.className = "text-blue-600";
                
                // Also test direct function call
                if (typeof window.showStationDetails === 'function') {
                    console.log('Testing showStationDetails with test data:', testStation);
                    window.showStationDetails(testStation);
                }
            } catch (error) {
                clickStatus.textContent = "Error: " + error.message;
                clickStatus.className = "text-red-600";
            }
        };

        window.clearResults = function() {
            document.getElementById('function-status').textContent = "Checking...";
            document.getElementById('function-status').className = "text-gray-600";
            document.getElementById('global-status').textContent = "Checking...";
            document.getElementById('global-status').className = "text-gray-600";
            document.getElementById('click-status').textContent = "Not tested";
            document.getElementById('click-status').className = "text-gray-600";
        };

        // Set up marker click handler for testing
        marker.on('click', function() {
            console.log('Marker clicked! Testing showStationDetails...');
            if (typeof window.showStationDetails === 'function') {
                window.showStationDetails(testStation);
                console.log('showStationDetails called successfully');
            } else {
                console.error('showStationDetails function not available');
            }
        });

        // Initialize test status
        document.getElementById('status').textContent = "Ready";
        document.getElementById('status').className = "text-green-600";
        
        console.log('Test page loaded. Click the marker or use the test buttons to verify functionality.');
    </script>
</body>
</html>
