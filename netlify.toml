# Netlify Configuration for FuelFinder PH
[build]
  command = "echo 'Static site build - no build command needed'"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Redirect all routes to appropriate pages for SPA
[[redirects]]
  from = "/webview"
  to = "/webview.html"
  status = 200

[[redirects]]
  from = "/map"
  to = "/map.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# PWA Service Worker
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Service-Worker-Allowed = "/"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
