<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Station Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="./config.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-black text-gray-800 mb-6">Station Rankings Test</h1>
        
        <!-- Fuel Type Selector -->
        <div class="flex gap-4 mb-6">
            <button onclick="loadRankings('diesel')" class="fuel-btn py-2 px-4 rounded-full text-sm font-bold border-2 border-gray-200 hover:border-blue-500 hover:text-blue-600 transition-colors" data-fuel="diesel">Diesel</button>
            <button onclick="loadRankings('u91')" class="fuel-btn py-2 px-4 rounded-full text-sm font-bold border-2 border-gray-200 hover:border-green-500 hover:text-green-600 transition-colors" data-fuel="u91">Unleaded 91</button>
            <button onclick="loadRankings('u95')" class="fuel-btn py-2 px-4 rounded-full text-sm font-bold border-2 border-gray-200 hover:border-red-500 hover:text-red-600 transition-colors" data-fuel="u95">Unleaded 95</button>
        </div>
        
        <!-- Current Selection Indicator -->
        <div id="current-fuel-display" class="mb-4 p-3 bg-blue-50 border border-blue-100 rounded-xl">
            <span class="text-sm font-bold text-blue-600 uppercase tracking-widest">Current: Diesel</span>
        </div>
        
        <!-- Rankings List -->
        <div id="station-rankings-list" class="space-y-3"></div>
        
        <!-- Test Results -->
        <div id="test-results" class="mt-8 p-4 bg-gray-50 rounded-xl">
            <h3 class="font-bold text-gray-700 mb-2">Test Results:</h3>
            <div id="test-output"></div>
        </div>
    </div>

    <script>
        // Helper functions
        function getBrandLogo(brand) {
            const brandKey = (brand || '').toLowerCase();
            const logoMap = {
                'shell': '⛽',
                'petron': '⛽',
                'caltex': '⛽',
                'flyingv': '⛽',
                'jetti': '⛽'
            };
            return logoMap[brandKey] || '⛽';
        }

        function getPriceColor(fuelType) {
            const colorMap = {
                'diesel': 'text-blue-600',
                'u91': 'text-green-600',
                'u95': 'text-red-600'
            };
            return colorMap[fuelType] || 'text-gray-600';
        }

        function getTimeAgo(date) {
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            return `${diffDays}d ago`;
        }

        // Load station rankings
        async function loadRankings(fuelType) {
            const display = document.getElementById('current-fuel-display');
            const list = document.getElementById('station-rankings-list');
            const testOutput = document.getElementById('test-output');
            
            // Update current selection display
            const fuelNames = {
                'diesel': 'Diesel',
                'u91': 'Unleaded 91', 
                'u95': 'Unleaded 95'
            };
            
            if (display) {
                display.innerHTML = `<span class="text-sm font-bold text-blue-600 uppercase tracking-widest">Current: ${fuelNames[fuelType] || fuelType}</span>`;
            }
            
            // Update button styles
            document.querySelectorAll('.fuel-btn').forEach(btn => {
                const isActive = btn.getAttribute('data-fuel') === fuelType;
                btn.style.borderColor = isActive ? '#3b82f6' : '#e5e7eb';
                btn.style.color = isActive ? '#2563eb' : '#6b7280';
                btn.style.backgroundColor = isActive ? '#eff6ff' : 'transparent';
            });
            
            // Show loading state
            if (list) {
                list.innerHTML = '<div class="flex justify-center p-4"><div class="loader"></div></div>';
            }
            
            try {
                const response = await fetch(`${config.API_BASE_URL}/api/station-rankings?fuelType=${encodeURIComponent(fuelType)}&limit=10`);
                const data = await response.json();
                
                testOutput.innerHTML = `<p class="text-green-600">✓ API call successful! Got ${data.rankings ? data.rankings.length : 0} stations</p>`;
                
                if (list && data.rankings) {
                    list.innerHTML = data.rankings.map((station, index) => {
                        const brandLogo = getBrandLogo(station.brand);
                        const priceColor = getPriceColor(fuelType);
                        
                        return `
                            <div class="bg-white border border-gray-100 rounded-2xl p-4 hover:shadow-md transition-shadow cursor-pointer">
                                <div class="flex items-center justify-between mb-3">
                                    <div class="flex items-center space-x-3">
                                        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">
                                            ${brandLogo}
                                        </div>
                                        <div>
                                            <h3 class="font-black text-gray-800 text-lg">${station.stationName}</h3>
                                            <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">${station.brand}</p>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Rank</div>
                                        <div class="w-8 h-8 ${priceColor} text-white rounded-full flex items-center justify-center font-black text-sm">
                                            #${index + 1}
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center space-x-4 text-sm">
                                        <span class="text-gray-600">📍 ${station.lat.toFixed(4)}, ${station.lng.toFixed(4)}</span>
                                        <span class="text-gray-600">👤 ${station.username}</span>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Price</div>
                                        <div class="text-2xl font-black ${priceColor}">₱${station.price.toFixed(2)}</div>
                                    </div>
                                </div>
                                <div class="mt-3 flex items-center justify-between text-xs text-gray-400">
                                    <span>Updated ${getTimeAgo(new Date(station.timestamp))}</span>
                                    <span class="px-2 py-1 bg-gray-100 rounded-full">Total Stations: ${data.totalStations}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (err) {
                console.error('Error loading station rankings:', err);
                testOutput.innerHTML = `<p class="text-red-600">✗ Error loading rankings: ${err.message}</p>`;
                if (list) {
                    list.innerHTML = '<p class="text-red-500 text-center p-4">Error loading rankings. Please try again.</p>';
                }
            }
        }

        // Initialize with diesel
        window.onload = () => {
            loadRankings('diesel');
        };
    </script>
</body>
</html>
